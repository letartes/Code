<!DOCTYPE html>
<!--
  Protein Sequence Liability Analyzer — Standalone HTML / React
  =============================================================
  Self-contained single-file application.
  Open directly in any modern browser — no build step, no server required.

  Detected liabilities:
    Deamidation · Oxidation · Isomerization · Glycosylation
    Pyroglutamate · Truncation/Clipping

  CDR annotation (VH / VL) is performed automatically when antibody
  variable-domain sequences are detected (Chothia-like approximation).

  Letarte Scientific Consulting
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Protein Sequence Liability Analyzer</title>

  <!-- React 18 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"
          crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"
          crossorigin="anonymous"></script>
  <!-- Babel standalone — transpiles JSX in browser -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"
          crossorigin="anonymous"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body { overflow: hidden; }
    ::-webkit-scrollbar { width: 7px; height: 7px; }
    ::-webkit-scrollbar-track { background: #f0f2f5; }
    ::-webkit-scrollbar-thumb { background: #c5cad4; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #9ba5b0; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useRef, useEffect } = React;

    // ─── CONSTANTS ───────────────────────────────────────────────────────────

    const RISK_ORDER = { high: 0, medium: 1, low: 2, info: 3 };

    const LIABILITIES = {
      deamidation: {
        label: "Deamidation",
        display_label: "Deamidation (Asn, Gln)",
        short: "Deam", category: "Deamidation", risk: "medium",
        color_text: "#c0392b", color_bg: "#fde8e8", color_border: "#e74c3c",
        description: "Asn (N) and Gln (Q). Non-enzymatic deamidation converts N→D or Q→E, introducing charge variants and potentially affecting potency and stability.",
        span_length: 1,
      },
      oxidation: {
        label: "Oxidation",
        display_label: "Oxidation (Met, Trp)",
        short: "Ox", category: "Oxidation", risk: "high",
        color_text: "#6c3483", color_bg: "#f4ecf7", color_border: "#9b59b6",
        description: "Met (M) and Trp (W). Methionine sulfoxide formation is a primary oxidative liability; tryptophan oxidation is common under photo-oxidative stress.",
        span_length: 1,
      },
      free_cys: {
        label: "Free Cysteine",
        display_label: "Free / Unpaired Cysteine (Cys)",
        short: "FreeCys", category: "Free Cysteine", risk: "medium",
        color_text: "#1a5276", color_bg: "#eaf4fb", color_border: "#2980b9",
        description: "Cys (C). Unpaired cysteines are susceptible to disulfide scrambling, oxidation (sulfenic/sulfinic acid), and covalent adduct formation.",
        span_length: 1,
      },
      isomerization: {
        label: "Isomerization",
        display_label: "Isomerization (Asp)",
        short: "Isom", category: "Isomerization", risk: "medium",
        color_text: "#7d6608", color_bg: "#fefde7", color_border: "#f1c40f",
        description: "Asp (D) in susceptible motifs (DG, DS, DT, DA, DN, DD, DH). Succinimide intermediate formation leads to racemization and isomerization (D→isoD).",
        span_length: 1,
      },
      n_glycan: {
        label: "N-Glycosylation Sequon",
        display_label: "N-Glycan sequon (N-X-S/T, X≠P)",
        short: "N-Gly", category: "Glycosylation", risk: "medium",
        color_text: "#1d6d2e", color_bg: "#e8f8e8", color_border: "#27ae60",
        description: "N-X-S/T sequon (X ≠ Pro). Potential site for complex or high-mannose N-glycan addition in the ER/Golgi.",
        span_length: 3,
      },
      glycation: {
        label: "Glycation",
        display_label: "Glycation (Lys)",
        short: "Glycat", category: "Glycation", risk: "medium",
        color_text: "#5b2333", color_bg: "#fce4ec", color_border: "#c2185b",
        description: "Lys (K). Non-enzymatic glycation (Maillard reaction) at accessible lysines in the presence of reducing sugars; alters charge heterogeneity and potency.",
        span_length: 1,
      },
      sulfation: {
        label: "Tyrosine Sulfation",
        display_label: "Sulfation (Tyr, D/E at −1)",
        short: "Sulf", category: "Sulfation", risk: "low",
        color_text: "#4a235a", color_bg: "#f3e5f5", color_border: "#8e24aa",
        description: "Tyr (Y) preceded by Asp (D) or Glu (E). The acidic residue at −1 is a key determinant for TPST recognition; can affect receptor binding and protein–protein interactions.",
        span_length: 1,
      },
      pyroglu: {
        label: "N-term Pyroglutamate",
        display_label: "Pyroglutamate (N-term Gln cyclisation)",
        short: "pyroGlu", category: "Pyroglutamate", risk: "medium",
        color_text: "#7e5109", color_bg: "#fef5e7", color_border: "#f0a500",
        description: "N-terminal Gln (Q) spontaneously cyclises to pyroglutamate (–17 Da, loss of NH₃). Common IgG heavy-chain N-terminal modification.",
        span_length: 1,
      },
      trunc_dp: {
        label: "Truncation – Asp–Pro Bond",
        display_label: "Truncation (Asp–Pro acid-labile bond)",
        short: "Trunc", category: "Truncation", risk: "high",
        color_text: "#922b21", color_bg: "#f9ebea", color_border: "#cb4335",
        description: "Asp–Pro (DP) peptide bond is unusually labile under mildly acidic conditions (pH 3–4), causing chain fragmentation.",
        span_length: 2,
      },
      cterm_k: {
        label: "C-term Lys Clipping",
        display_label: "C-terminal Lys truncation",
        short: "C-Lys", category: "C-term Processing", risk: "medium",
        color_text: "#7b241c", color_bg: "#fdedec", color_border: "#e74c3c",
        description: "C-terminal Lys removed by carboxypeptidase B during CHO expression; common IgG microheterogeneity.",
        span_length: 1,
      },
      cterm_amid: {
        label: "C-term Alpha-Amidation",
        display_label: "C-term alpha-amidation (Pro at −1 relative to C-term GK)",
        short: "C-Amid", category: "C-term Processing", risk: "medium",
        color_text: "#1b5e20", color_bg: "#e8f5e9", color_border: "#43a047",
        description: "Pro (P) at position −1 relative to a C-terminal Gly–Lys (GK). PAM enzyme uses Gly as amide donor to amidate Pro; Gly and Lys are lost upon processing.",
        span_length: 1,
      },
    };

    const CAT_ORDER = ["Deamidation","Oxidation","Free Cysteine","Isomerization","Glycosylation","Glycation","Sulfation","Pyroglutamate","Truncation","C-term Processing"];
    const CAT_ICONS = { Deamidation:"🧪", Oxidation:"⚡", "Free Cysteine":"🔗", Isomerization:"🔄", Glycosylation:"🍬", Glycation:"🍯", Sulfation:"🟣", Pyroglutamate:"🔵", Truncation:"✂️", "C-term Processing":"🔚" };
    // 12 modifications, one per row in the reference list
    const RISK_COLORS = {
      high:   { bg:"#fde8e8", text:"#c0392b", border:"#e74c3c" },
      medium: { bg:"#fef0e6", text:"#d35400", border:"#e67e22" },
      low:    { bg:"#e8f8f5", text:"#0e6655", border:"#1abc9c" },
      info:   { bg:"#d6eaf8", text:"#154360", border:"#2e86c1" },
    };
    const T = {
      bgDark:"#1a1a2e", bgMid:"#16213e", bgAccent:"#0f3460", btnBlue:"#0d2d6b",
      bgLight:"#f0f2f5", bgWhite:"#ffffff", bgPanel:"#f8f9fa",
      fgDark:"#1a1a2e", fgMuted:"#6b7280", fgSubtle:"#9ba5b0", border:"#e5e7eb",
    };

    // CDR scheme parameters
    // vh/vl keys:
    //   h1co / l1co : CDR1 start offset from conserved Cys
    //   h1fe / l1fe : CDR1 end offset from FR2 landmark (negative = before FR2, positive = past it)
    //   h2fs / l2fs : CDR2 start offset from FR2
    //   h2fe / l2fe : CDR2 end offset from FR2
    //   h1min/h1max / l1min/l1max : valid CDR1 length range
    const CDR_SCHEMES = {
      kabat: {
        label: "Kabat",
        vh: { h1co:8,  h1fe:-1, h2fs:14, h2fe:29, h1min:3, h1max:12 },
        vl: { l1co:1,  l1fe:-1, l2fs:14, l2fe:20, l1min:6, l1max:17 },
      },
      chothia: {
        label: "Chothia",
        vh: { h1co:3,  h1fe:-1, h2fs:14, h2fe:30, h1min:4, h1max:15 },
        vl: { l1co:1,  l1fe:-1, l2fs:13, l2fe:19, l1min:6, l1max:18 },
      },
      imgt: {
        label: "IMGT",
        vh: { h1co:4,  h1fe:2,  h2fs:20, h2fe:29, h1min:5, h1max:17 },
        vl: { l1co:3,  l1fe:2,  l2fs:19, l2fe:28, l1min:5, l1max:17 },
      },
    };

    // ─── ENGINE ──────────────────────────────────────────────────────────────

    function parseFasta(text) {
      const seqs = []; let name = null, buf = [];
      for (const raw of text.split("\n")) {
        const line = raw.trim(); if (!line) continue;
        if (line.startsWith(">")) {
          if (buf.length && name !== null) seqs.push([name, buf.join("").toUpperCase()]);
          name = line.slice(1).trim() || "Sequence"; buf = [];
        } else { buf.push(line.replace(/[^A-Za-z]/g,"")); }
      }
      if (buf.length && name !== null) seqs.push([name, buf.join("").toUpperCase()]);
      return seqs;
    }

    const cleanSeq = s => s.replace(/[^A-Za-z]/g,"").toUpperCase();

    function findCdrs(seq, scheme="kabat") {
      // Searches for both VH and VL domains independently (supports IgG HC, LC, and scFv).
      // Returns empty array if no antibody variable-domain landmarks are detected.
      const s = seq.toUpperCase(); const cdrs = [];
      const p = CDR_SCHEMES[scheme] || CDR_SCHEMES.kabat;

      // ── VH ──
      const vhFr4 = s.match(/WG[QKHR]G[TS]/);
      if (vhFr4) {
        const fr4 = vhFr4.index; let h3f = null;
        const w3 = s.slice(Math.max(0,fr4-30),fr4); const r3 = w3.lastIndexOf("C");
        if (r3>=0) { const h3s=Math.max(0,fr4-30)+r3+1,h3e=fr4-1,l=h3e-h3s+1;
          if (l>=2&&l<=28){cdrs.push([h3s,h3e,"CDR-H3"]);h3f=h3s;} }
        const seg=s.slice(0,Math.max(0,fr4-35)); let fr2m=null;
        for (const m of [...seg.matchAll(/W[VILMAF][RQHK]/g)]) fr2m=m;
        if (fr2m) { const fr2=fr2m.index;
          const w1=s.slice(Math.max(0,fr2-22),fr2); const r1=w1.lastIndexOf("C");
          if (r1>=0){const ca=Math.max(0,fr2-22)+r1,h1s=ca+p.vh.h1co,h1e=fr2+p.vh.h1fe,l=h1e-h1s+1;
            if(l>=p.vh.h1min&&l<=p.vh.h1max)cdrs.push([h1s,h1e,"CDR-H1"]);}
          let h2s=fr2+p.vh.h2fs,h2e=fr2+p.vh.h2fe; if(h3f!==null)h2e=Math.min(h2e,h3f-29);
          const l2=h2e-h2s+1; if(l2>=5&&l2<=22)cdrs.push([h2s,h2e,"CDR-H2"]); }
      }

      // ── VL ──
      const vlFr4 = s.match(/FG[QNRST]G[TS]/);
      if (vlFr4) {
        const fr4=vlFr4.index; let l3f=null;
        const w3=s.slice(Math.max(0,fr4-18),fr4); const r3=w3.lastIndexOf("C");
        if (r3>=0){const l3s=Math.max(0,fr4-18)+r3+1,l3e=fr4-1,l=l3e-l3s+1;
          if(l>=3&&l<=14){cdrs.push([l3s,l3e,"CDR-L3"]);l3f=l3s;}}
        const seg=s.slice(0,Math.max(0,fr4-35)); let fr2m=null;
        for (const m of [...seg.matchAll(/W[YFH][LQP]/g)]) fr2m=m;
        if (fr2m) { const fr2=fr2m.index;
          const w1=s.slice(Math.max(0,fr2-28),fr2); const r1=w1.lastIndexOf("C");
          if (r1>=0){const ca=Math.max(0,fr2-28)+r1,l1s=ca+p.vl.l1co,l1e=fr2+p.vl.l1fe,l=l1e-l1s+1;
            if(l>=p.vl.l1min&&l<=p.vl.l1max)cdrs.push([l1s,l1e,"CDR-L1"]);}
          let l2s=fr2+p.vl.l2fs,l2e=fr2+p.vl.l2fe; if(l3f!==null)l2e=Math.min(l2e,l3f-29);
          const l2=l2e-l2s+1; if(l2>=3&&l2<=12)cdrs.push([l2s,l2e,"CDR-L2"]); }
      }

      return cdrs.sort((a,b)=>a[0]-b[0]);
    }

    function cdrAt(pos, cdrs) {
      for (const [s,e,n] of cdrs) if (pos>=s&&pos<=e) return n;
      return null;
    }

    function findLiabilities(seq, cdrs=[]) {
      const f=[]; const n=seq.length;
      function add(key,pos0,span,note="") {
        const lib=LIABILITIES[key];
        f.push({type:key,pos0,span,pos1:pos0+1,residues:seq.slice(pos0,pos0+span),
          note,cdr:cdrAt(pos0,cdrs),...(({description,span_length,...rest})=>rest)(lib)});
      }
      // Deamidation (N, Q) — all Asn and Gln residues
      for (let i=0;i<n;i++) { if("NQ".includes(seq[i]))add("deamidation",i,1); }
      // Oxidation (M, W)
      for (let i=0;i<n;i++) { if("MW".includes(seq[i]))add("oxidation",i,1); }
      // Free / unpaired Cysteine (C)
      for (let i=0;i<n;i++) { if(seq[i]==="C")add("free_cys",i,1); }
      // Isomerization (D in susceptible motifs)
      const ISOM=new Set(["DG","DS","DT","DA","DN","DD","DH"]);
      for (let i=0;i<n-1;i++) { if(ISOM.has(seq.slice(i,i+2)))add("isomerization",i,1); }
      // N-Glycosylation (N-X-S/T, X≠P)
      for (let i=0;i<n-2;i++) if(seq[i]==="N"&&seq[i+1]!=="P"&&"ST".includes(seq[i+2]))add("n_glycan",i,3);
      // Glycation (K)
      for (let i=0;i<n;i++) { if(seq[i]==="K")add("glycation",i,1); }
      // Sulfation (Y with D or E at −1 position)
      for (let i=1;i<n;i++) { if(seq[i]==="Y"&&"DE".includes(seq[i-1]))add("sulfation",i,1); }
      // N-term pyroglutamate (Q only at position 0)
      if(n>0&&seq[0]==="Q")add("pyroglu",0,1,"N-term Gln → pyroglutamate (–17 Da, loss of NH₃)");
      // Truncation — acid-labile Asp–Pro bond
      for (let i=0;i<n-1;i++) if(seq.slice(i,i+2)==="DP")add("trunc_dp",i,2,"Acid-labile Asp–Pro bond");
      // C-terminal Lys clipping
      if(n>0&&seq[n-1]==="K")add("cterm_k",n-1,1,"C-terminal Lys — carboxypeptidase B clipping (CHO expression)");
      // C-terminal alpha-amidation (C-terminal –PGK motif; Pro is amidated, Gly and Lys lost)
      if(n>=3&&seq[n-3]==="P"&&seq[n-2]==="G"&&seq[n-1]==="K")add("cterm_amid",n-3,1,"C-terminal PGK: Pro amidated by PAM, Gly and Lys lost");
      return f;
    }

    function summarize(findings,seqLen) {
      const byCat={},byRisk={};
      for (const f of findings) {
        if(!byCat[f.category])byCat[f.category]=[];byCat[f.category].push(f);
        if(!byRisk[f.risk])byRisk[f.risk]=[];byRisk[f.risk].push(f);
      }
      return {total:findings.length,byCat,byRisk,seqLen};
    }

    function process(pairs, scheme="kabat") {
      return pairs.map(([name,raw])=>{
        const seq=cleanSeq(raw),cdrs=findCdrs(seq,scheme),findings=findLiabilities(seq,cdrs);
        return {name,seq,findings,summary:summarize(findings,seq.length),cdrs};
      });
    }

    // ─── HTML REPORT ─────────────────────────────────────────────────────────

    function buildReport(results) {
      const now=new Date().toISOString().slice(0,16).replace("T"," ");
      const ci={Deamidation:"🧪",Oxidation:"⚡",Isomerization:"🔄",Glycosylation:"🍬",Pyroglutamate:"🔵",Truncation:"✂️"};
      const sections=results.map(({name,seq,findings,summary,cdrs})=>{
        const hc=(summary.byRisk.high||[]).length;
        const cards=CAT_ORDER.map(cat=>{
          const items=summary.byCat[cat]||[];
          const h=items.filter(f=>f.risk==="high").length,m=items.filter(f=>f.risk==="medium").length,l=items.filter(f=>f.risk==="low").length;
          const bars=[h?`<span class="rb rh">${h}H</span>`:"",m?`<span class="rb rm">${m}M</span>`:"",l?`<span class="rb rl">${l}L</span>`:""].filter(Boolean).join(" ");
          return `<div class="sc"><div class="si">${ci[cat]||"•"}</div><div class="sn">${items.length}</div><div class="st">${cat}</div><div>${bars||"—"}</div></div>`;
        }).join("");
        const cdrInfo=cdrs.length?`<div class="ci">📐 <b>CDRs:</b> ${cdrs.map(([s,e,n])=>`<b>${n}</b> (${s+1}–${e+1})`).join(", ")} <em>(Chothia approx.)</em></div>`:"";
        // Annotated seq
        const n=seq.length;
        const pf=Array.from({length:n},()=>[]);
        for(const f of findings) pf[f.pos0].push(f);
        const cp={};for(const[cs,ce,cn]of cdrs)for(let p=cs;p<=ce;p++)cp[p]=cn;
        const WRAP=60;const lines=[];
        for(let st=0;st<n;st+=WRAP){
          const en=Math.min(st+WRAP,n);let line=`<span class="pl">${String(st+1).padStart(5)} </span>`;
          for(let i=st;i<en;i++){
            const aa=seq[i],fl=pf[i],ic=cp[i]!==undefined;
            if(fl.length){const bf=fl.reduce((a,b)=>RISK_ORDER[a.risk]<=RISK_ORDER[b.risk]?a:b);
              const ud=ic?"text-decoration:underline;text-decoration-thickness:2px;":"";
              line+=`<span style="background:${bf.color_bg};color:${bf.color_text};border-bottom:2px solid ${bf.color_border};${ud}font-weight:700" title="Pos ${i+1}: ${bf.short}">${aa}</span>`;
            } else if(ic){line+=`<span class="ca" title="${cp[i]}">${aa}</span>`;}
            else line+=aa;
          }
          const ct=cdrs.filter(([cs,ce])=>cs<en&&ce>=st).map(([cs,ce,cn])=>`<span class="cl">${cn}:${Math.max(cs,st)+1}–${Math.min(ce,en-1)+1}</span>`).join("");
          lines.push(line+` <span class="pl">${en}</span>`+(ct?"  "+ct:""));
        }
        const rows=[...findings].sort((a,b)=>RISK_ORDER[a.risk]-RISK_ORDER[b.risk]||a.pos0-b.pos0).map(f=>{
          const rb=`<span class="rb r${f.risk[0]}">${f.risk.toUpperCase()}</span>`;
          const rs=`<span style="background:${f.color_bg};color:${f.color_text};border:1px solid ${f.color_border};padding:1px 5px;border-radius:3px;font-family:monospace;font-weight:700">${f.residues[0]}</span>`;
          const cb=f.cdr?`<span class="cb">${f.cdr}</span>`:"";
          return `<tr><td class="pc">${f.pos1}</td><td>${rs}</td><td>${f.category}</td><td>${rb}</td><td>${f.display_label}</td><td>${f.note||"—"} ${cb}</td></tr>`;
        }).join("");
        return `<div class="sec"><div class="sh">${name}<span class="sm">${summary.seqLen} aa · ${summary.total} findings${cdrs.length?" · "+cdrs.length+" CDR(s)":""}</span></div>
          <div class="sb"><div class="al" style="background:${hc?"#fde8e8":"#d6eaf8"};color:${hc?"#c0392b":"#154360"}">${hc?"⚠️ "+hc+" high-risk finding(s).":"✅ No high-risk findings."}</div>
          ${cdrInfo}<div class="sg">${cards}</div>
          <div class="sl">Annotated Sequence</div><div class="sq">${lines.join("\n")}</div>
          <div class="sl" style="margin-top:16px">Liabilities Detail</div>
          <div style="overflow-x:auto"><table><thead><tr><th>Pos.</th><th>Residue</th><th>Category</th><th>Risk</th><th>Liability Type</th><th>Note / CDR</th></tr></thead><tbody>${rows}</tbody></table></div>
          </div></div>`;
      }).join("");
      const leg=Object.entries(LIABILITIES).map(([,lib])=>`<tr><td><span style="background:${lib.color_bg};color:${lib.color_text};border:1px solid ${lib.color_border};padding:2px 6px;border-radius:3px;font-family:monospace;font-weight:600">${lib.short}</span></td><td>${lib.label}</td><td><span class="rb r${lib.risk[0]}">${lib.risk.toUpperCase()}</span></td><td style="color:#555;font-size:.85em">${lib.description}</td></tr>`).join("");
      return `<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Protein Liability Analysis</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f0f2f5;color:#1a1a2e;font-size:15px}.pw{max-width:1200px;margin:0 auto;padding:24px 16px 60px}.hdr{background:linear-gradient(135deg,#1a1a2e,#0f3460);color:#fff;border-radius:12px;padding:32px 36px;margin-bottom:28px}.hdr h1{font-size:1.9em;font-weight:700;margin-bottom:6px}.hdr .sub{color:#a8b2c8;font-size:.95em}.hdr .meta{margin-top:16px;font-size:.85em;color:#c0c8dc;display:flex;gap:24px;flex-wrap:wrap}.sec{background:#fff;border-radius:10px;box-shadow:0 1px 6px rgba(0,0,0,.08);margin-bottom:24px;overflow:hidden}.sh{padding:16px 24px;border-bottom:1px solid #eee;font-weight:700;font-size:1.05em;background:#fafbfc}.sm{font-weight:400;font-size:.88em;color:#888;margin-left:10px}.sb{padding:20px 24px}.al{padding:10px 16px;border-radius:6px;margin-bottom:14px;font-weight:600;font-size:.9em}.ci{background:#e3f2fd;color:#1565c0;padding:8px 14px;border-radius:6px;margin-bottom:12px;font-size:.88em}.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}.sc{background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:12px;text-align:center}.si{font-size:1.5em;margin-bottom:2px}.sn{font-size:1.8em;font-weight:700;color:#1a1a2e}.st{font-size:.72em;font-weight:700;color:#6b7280;margin:2px 0 5px}.rb{display:inline-block;padding:2px 7px;border-radius:20px;font-size:.72em;font-weight:700;white-space:nowrap}.rh{background:#fde8e8;color:#c0392b;border:1px solid #e74c3c}.rm{background:#fef0e6;color:#d35400;border:1px solid #e67e22}.rl{background:#e8f8f5;color:#0e6655;border:1px solid #1abc9c}.ri{background:#d6eaf8;color:#154360;border:1px solid #2e86c1}.sl{font-weight:700;margin-bottom:8px;font-size:.95em}.sq{font-family:"Courier New",monospace;font-size:.88em;line-height:2.1;background:#f8f9fa;border-radius:8px;padding:14px;overflow-x:auto;white-space:pre-wrap;word-break:break-all}.pl{color:#9ba5b0;user-select:none;font-size:.85em}.ca{text-decoration:underline;text-decoration-thickness:2px;color:#1565c0}.cl{color:#1a5276;font-size:.76em;font-weight:600;margin-left:6px}.cb{display:inline-block;padding:1px 6px;border-radius:10px;background:#e3f2fd;color:#1565c0;font-size:.75em;font-weight:700;margin-left:4px}table{width:100%;border-collapse:collapse;font-size:.88em}thead th{background:#f4f5f7;padding:10px 12px;text-align:left;font-weight:700;color:#444;border-bottom:2px solid #e0e3e8}tbody tr{border-bottom:1px solid #f0f0f0}tbody tr:hover{background:#fafbff}tbody td{padding:8px 12px;vertical-align:middle}.pc{font-family:monospace;color:#7f8c8d;font-weight:600}.footer{text-align:center;margin-top:40px;font-size:.82em;color:#aaa}</style></head><body><div class="pw"><div class="hdr"><h1>🔬 Protein Sequence Liability Analysis</h1><div class="sub">PTM risk · deamidation · oxidation · isomerization · glycosylation · pyroglutamate · truncation</div><div class="meta"><span>📅 ${now}</span><span>🔢 ${results.length} chain(s)</span><span>⚗️ Letarte Scientific Consulting</span></div></div>${sections}<div class="sec"><div class="sh">📖 Liability Legend</div><div class="sb"><table><thead><tr><th>Code</th><th>Liability</th><th>Risk</th><th>Description</th></tr></thead><tbody>${leg}</tbody></table><p style="margin-top:14px;font-size:.82em;color:#888">CDR boundaries are approximate (sequence-based landmark detection). Tryptic K/R sites excluded from truncation.</p></div></div><div class="footer">Protein Liability Analyzer · Letarte Scientific Consulting · For R&amp;D use only</div></div></body></html>`;
    }

    // ─── COMPONENTS ──────────────────────────────────────────────────────────

    function RiskBadge({risk,small=false}) {
      const c=RISK_COLORS[risk]||RISK_COLORS.info;
      return <span style={{display:"inline-block",padding:small?"1px 5px":"2px 8px",borderRadius:20,fontSize:small?"0.7em":"0.8em",fontWeight:700,background:c.bg,color:c.text,border:`1px solid ${c.border}`,whiteSpace:"nowrap"}}>{risk.toUpperCase()}</span>;
    }

    function ChainSummary({result}) {
      const {name,findings,summary,cdrs}=result;
      const hc=(summary.byRisk.high||[]).length;
      return (
        <div style={{marginBottom:20,border:`1px solid ${T.border}`,borderRadius:8,overflow:"hidden"}}>
          <div style={{background:T.bgPanel,padding:"8px 14px",borderBottom:`1px solid ${T.border}`,fontWeight:700,fontSize:"0.9em",color:T.fgDark,display:"flex",alignItems:"center",gap:10}}>
            <span>▶ {name}</span>
            <span style={{fontWeight:400,fontSize:"0.82em",color:T.fgMuted}}>{summary.seqLen} aa · {summary.total} findings{cdrs.length?` · ${cdrs.length} CDR(s)`:""}</span>
          </div>
          <div style={{padding:"12px 14px"}}>
            <div style={{padding:"8px 14px",borderRadius:6,marginBottom:10,fontWeight:600,fontSize:"0.88em",background:hc?"#fde8e8":"#d6eaf8",color:hc?"#c0392b":"#154360"}}>
              {hc?`⚠️  ${hc} high-risk liabilit${hc===1?"y":"ies"} detected`:"✅  No high-risk liabilities detected"}
            </div>
            {cdrs.length>0&&(
              <div style={{background:"#e3f2fd",color:"#1565c0",padding:"7px 12px",borderRadius:6,marginBottom:10,fontSize:"0.84em"}}>
                📐&nbsp;<b>CDRs detected:</b>&nbsp;
                {cdrs.map(([s,e,n])=><span key={n} style={{marginRight:10}}><b>{n}</b> ({s+1}–{e+1})</span>)}
              </div>
            )}
            <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:6,marginBottom:10}}>
              {CAT_ORDER.map(cat=>{
                const items=summary.byCat[cat]||[];
                const h=items.filter(f=>f.risk==="high").length,m=items.filter(f=>f.risk==="medium").length,l=items.filter(f=>f.risk==="low").length;
                return (
                  <div key={cat} style={{background:T.bgWhite,border:`1px solid ${T.border}`,borderRadius:8,padding:"8px 4px",textAlign:"center"}}>
                    <div style={{fontSize:16}}>{CAT_ICONS[cat]}</div>
                    <div style={{fontSize:20,fontWeight:700,color:T.fgDark,lineHeight:1.2}}>{items.length}</div>
                    <div style={{fontSize:"0.65em",fontWeight:700,color:T.fgMuted,marginBottom:3}}>{cat}</div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:2,justifyContent:"center"}}>
                      {h>0&&<RiskBadge risk="high" small/>}
                      {m>0&&<RiskBadge risk="medium" small/>}
                      {l>0&&<RiskBadge risk="low" small/>}
                    </div>
                  </div>
                );
              })}
            </div>
            <div style={{fontSize:"0.82em",color:T.fgMuted}}>
              High: <b style={{color:"#c0392b"}}>{(summary.byRisk.high||[]).length}</b> &nbsp;·&nbsp;
              Med: <b style={{color:"#d35400"}}>{(summary.byRisk.medium||[]).length}</b> &nbsp;·&nbsp;
              Low: <b style={{color:"#0e6655"}}>{(summary.byRisk.low||[]).length}</b>
            </div>
          </div>
        </div>
      );
    }

    function SummaryTab({results}) {
      if (!results||!results.length) return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100%",color:T.fgMuted,fontSize:16}}>🔬&nbsp;Paste a sequence and click <b style={{margin:"0 6px"}}>ANALYZE</b></div>;
      return (
        <div style={{padding:"16px 20px",overflowY:"auto",height:"100%"}}>
          {results.map((r,i)=><ChainSummary key={i} result={r}/>)}
          <div style={{background:T.bgPanel,borderRadius:8,padding:"12px 16px",border:`1px solid ${T.border}`}}>
            <div style={{fontWeight:700,fontSize:"0.86em",marginBottom:8,color:T.fgMuted}}>Liability Legend</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
              {Object.entries(LIABILITIES).map(([key,lib])=>(
                <span key={key} title={lib.description} style={{padding:"2px 6px",borderRadius:4,fontSize:"0.76em",fontWeight:700,background:lib.color_bg,color:lib.color_text,border:`1px solid ${lib.color_border}`,fontFamily:"monospace",cursor:"help"}}>{lib.short}</span>
              ))}
            </div>
            <div style={{fontSize:"0.74em",color:"#aaa",marginTop:8}}>CDR boundaries are approximate (sequence-based landmark detection). Tryptic K/R sites excluded from truncation.</div>
          </div>
        </div>
      );
    }

    function AnnotatedSeqTab({results,scheme,setScheme}) {
      const WRAP=60;
      if (!results||!results.length) return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100%",color:T.fgMuted}}>Run an analysis to see the annotated sequence.</div>;
      return (
        <div style={{padding:"12px 16px",overflowY:"auto",height:"100%"}}>
          <div style={{background:T.bgPanel,padding:"6px 12px",borderRadius:6,marginBottom:12,display:"flex",flexWrap:"wrap",gap:5,alignItems:"center",fontSize:"0.8em",color:T.fgMuted,border:`1px solid ${T.border}`}}>
            <b>Key:</b>
            {Object.entries(LIABILITIES).map(([k,lib])=>(
              <span key={k} style={{padding:"1px 4px",borderRadius:3,fontFamily:"monospace",fontWeight:700,background:lib.color_bg,color:lib.color_text,fontSize:"0.88em"}}>{lib.short}</span>
            ))}
            <span style={{marginLeft:6}}>·</span>
            <span style={{textDecoration:"underline",textDecorationThickness:2,textUnderlineOffset:2,fontFamily:"monospace",color:"#1565c0",fontWeight:700}}>CDR</span>
            <span style={{fontStyle:"italic"}}>(underlined)</span>
            <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:5}}>
              <span style={{fontWeight:600,color:T.fgMuted}}>CDR scheme:</span>
              <select value={scheme} onChange={e=>setScheme(e.target.value)}
                style={{fontSize:"0.9em",padding:"2px 6px",borderRadius:4,border:`1px solid ${T.border}`,background:T.bgWhite,cursor:"pointer",fontWeight:600}}>
                {Object.entries(CDR_SCHEMES).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
              </select>
            </div>
          </div>
          {results.map(({name,seq,findings,cdrs},ci)=>{
            const n=seq.length;
            const pf=Array.from({length:n},()=>[]);
            for(const f of findings) pf[f.pos0].push(f);
            const cp={};for(const[cs,ce,cn]of cdrs)for(let p=cs;p<=ce;p++)cp[p]=cn;
            const lines=[];
            for(let st=0;st<n;st+=WRAP){
              const en=Math.min(st+WRAP,n),chars=[];
              for(let i=st;i<en;i++){
                const aa=seq[i],fl=pf[i],ic=cp[i]!==undefined;
                let sty={fontFamily:"monospace",fontSize:13,display:"inline-block",lineHeight:"22px"};
                let ti=`Pos ${i+1}`;
                if(fl.length){
                  const bf=fl.reduce((a,b)=>RISK_ORDER[a.risk]<=RISK_ORDER[b.risk]?a:b);
                  sty={...sty,background:bf.color_bg,color:bf.color_text,fontWeight:700,...(ic?{textDecoration:"underline",textDecorationThickness:2,textUnderlineOffset:2}:{})};
                  ti=`Pos ${i+1}: ${bf.short}${ic?` [${cp[i]}]`:""}`;
                } else if(ic){sty={...sty,textDecoration:"underline",textDecorationThickness:2,textUnderlineOffset:2,color:"#1565c0"};ti=`Pos ${i+1}: ${cp[i]}`;}
                chars.push(<span key={i} style={sty} title={ti}>{aa}</span>);
              }
              const ct=cdrs.filter(([cs,ce])=>cs<en&&ce>=st).map(([cs,ce,cn])=>(
                <span key={cn} style={{fontSize:"0.74em",color:"#1565c0",fontWeight:700,marginLeft:6}}>{cn}:{Math.max(cs,st)+1}–{Math.min(ce,en-1)+1}</span>
              ));
              lines.push(
                <div key={st} style={{lineHeight:"22px",marginBottom:2}}>
                  <span style={{color:T.fgSubtle,fontSize:11,fontFamily:"monospace",minWidth:40,display:"inline-block",userSelect:"none"}}>{String(st+1).padStart(5)}</span>
                  {" "}{chars}{" "}
                  <span style={{color:T.fgSubtle,fontSize:11,fontFamily:"monospace",userSelect:"none"}}>{en}</span>
                  {ct}
                </div>
              );
            }
            const hdr=cdrs.length?"  ["+cdrs.map(([s,e,n])=>`${n}:${s+1}-${e+1}`).join("  ")+"]":"";
            return (
              <div key={ci} style={{marginBottom:24}}>
                <div style={{fontFamily:"monospace",fontWeight:700,fontSize:13,color:"#1565c0",marginBottom:4}}>▶ {name}{hdr}</div>
                <div style={{background:T.bgPanel,borderRadius:8,padding:"12px 14px",border:`1px solid ${T.border}`}}>{lines}</div>
              </div>
            );
          })}
        </div>
      );
    }

    function FindingsTab({results}) {
      const [rf,setRf]=useState("All"),[cf,setCf]=useState("All"),[co,setCo]=useState(false);
      const [sc,setSc]=useState("pos"),[sa,setSa]=useState(true);
      const all=useMemo(()=>{
        if(!results)return[];
        return results.flatMap(({name,findings})=>findings.map(f=>({...f,chainName:name})));
      },[results]);
      const rows=useMemo(()=>{
        let r=all;
        if(rf!=="All")r=r.filter(x=>x.risk===rf.toLowerCase());
        if(cf!=="All")r=r.filter(x=>x.category===cf);
        if(co)r=r.filter(x=>x.cdr);
        const ck={pos:x=>x.pos1,residue:x=>x.residues[0],category:x=>x.category,risk:x=>RISK_ORDER[x.risk],type:x=>x.display_label,cdr:x=>x.cdr||"",note:x=>x.note||""}[sc]||(x=>x.pos1);
        return [...r].sort((a,b)=>{const av=ck(a),bv=ck(b);const c=typeof av==="number"?av-bv:String(av).localeCompare(String(bv));return sa?c:-c;});
      },[all,rf,cf,co,sc,sa]);
      const hs=(col)=>{if(sc===col)setSa(v=>!v);else{setSc(col);setSa(true);}};
      const th={padding:"8px 10px",textAlign:"left",fontWeight:700,fontSize:"0.82em",color:"#444",background:T.bgPanel,borderBottom:`2px solid ${T.border}`,cursor:"pointer",userSelect:"none",whiteSpace:"nowrap"};
      const si=(col)=><span style={{marginLeft:3,color:sc===col?"#333":"#ccc"}}>{sc===col?(sa?"↑":"↓"):"⇅"}</span>;
      if(!results||!results.length) return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100%",color:T.fgMuted}}>Run an analysis to see findings.</div>;
      return (
        <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
          <div style={{background:T.bgPanel,padding:"8px 14px",display:"flex",flexWrap:"wrap",gap:10,alignItems:"center",borderBottom:`1px solid ${T.border}`,flexShrink:0}}>
            <span style={{fontSize:"0.83em",color:T.fgMuted,fontWeight:600}}>Risk:</span>
            {["All","High","Medium","Low"].map(r=>(
              <label key={r} style={{display:"flex",alignItems:"center",gap:3,fontSize:"0.83em",cursor:"pointer"}}>
                <input type="radio" name="rf" checked={rf===r} onChange={()=>setRf(r)}/>{r}
              </label>
            ))}
            <span style={{fontSize:"0.83em",color:T.fgMuted,fontWeight:600,marginLeft:6}}>Category:</span>
            <select value={cf} onChange={e=>setCf(e.target.value)} style={{fontSize:"0.83em",padding:"2px 6px",borderRadius:4,border:`1px solid ${T.border}`}}>
              {["All",...CAT_ORDER].map(c=><option key={c} value={c}>{c}</option>)}
            </select>
            <label style={{display:"flex",alignItems:"center",gap:3,fontSize:"0.83em",cursor:"pointer",marginLeft:6}}>
              <input type="checkbox" checked={co} onChange={e=>setCo(e.target.checked)}/>CDR only
            </label>
            <span style={{marginLeft:"auto",fontSize:"0.8em",color:T.fgMuted}}>{rows.length} finding{rows.length!==1?"s":""}</span>
          </div>
          <div style={{overflowY:"auto",flex:1}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:"0.86em"}}>
              <thead>
                <tr>
                  {[["pos","Pos."],["residue","Residue"],["category","Category"],["risk","Risk"],["type","Liability Type"],["cdr","CDR"],["note","Note"]].map(([col,lbl])=>(
                    <th key={col} style={th} onClick={()=>hs(col)}>{lbl}{si(col)}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {rows.map((f,i)=>{
                  const rc=RISK_COLORS[f.risk];
                  const bg=rc?rc.bg+"44":"transparent";
                  const td={padding:"7px 10px",borderBottom:`1px solid ${T.border}`,verticalAlign:"middle",background:bg};
                  return (
                    <tr key={i}>
                      <td style={{...td,fontFamily:"monospace",color:T.fgMuted,fontWeight:700,textAlign:"center",width:55}}>{f.pos1}</td>
                      <td style={{...td,textAlign:"center",width:60}}>
                        <span style={{background:f.color_bg,color:f.color_text,border:`1px solid ${f.color_border}`,padding:"1px 6px",borderRadius:3,fontFamily:"monospace",fontWeight:700}}>{f.residues[0]}</span>
                      </td>
                      <td style={td}>{f.category}</td>
                      <td style={{...td,width:80}}><RiskBadge risk={f.risk} small/></td>
                      <td style={{...td,fontSize:"0.82em",color:"#555"}}>{f.display_label}</td>
                      <td style={{...td,width:80,textAlign:"center"}}>
                        {f.cdr?<span style={{background:"#e3f2fd",color:"#1565c0",padding:"1px 6px",borderRadius:10,fontSize:"0.76em",fontWeight:700}}>{f.cdr}</span>:"—"}
                      </td>
                      <td style={{...td,fontSize:"0.78em",color:"#555",maxWidth:240}}>{f.note||"—"}</td>
                    </tr>
                  );
                })}
                {rows.length===0&&<tr><td colSpan={7} style={{textAlign:"center",padding:24,color:T.fgMuted,fontStyle:"italic"}}>No findings match the current filters.</td></tr>}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    // ─── APP ─────────────────────────────────────────────────────────────────

    function App() {
      const PH=">MyProtein_HC\nEVQLVESGGGLVQPGGSLRLSCAAGFNIKDTYIH...\n\nAccepts:\n  • FASTA (single or multi-chain)\n  • Raw amino-acid sequence\n  • Multiple FASTA entries in one paste";
      const [input,setInput]=useState(PH),[ph,setPh]=useState(true);
      const [results,setResults]=useState(null);
      const [tab,setTab]=useState(0),[busy,setBusy]=useState(false);
      const [status,setStatus]=useState("Ready.");
      const [scheme,setScheme]=useState("kabat");
      const fileRef=useRef(null);
      const lastRawRef=useRef("");

      const onFocus=()=>{if(ph){setInput("");setPh(false);}};
      const onBlur=()=>{if(!input.trim()){setInput(PH);setPh(true);}};
      const onLoad=e=>{const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=ev=>{setInput(ev.target.result.trim());setPh(false);setStatus(`Loaded: ${file.name}`);};r.readAsText(file);e.target.value="";};
      const onClear=()=>{setInput(PH);setPh(true);setResults(null);setStatus("Ready.");};

      const runAnalysis=(raw,sch)=>{
        const pairs=raw.includes(">")?parseFasta(raw):[["Sequence",raw]];
        if(!pairs.length)return;
        const res=process(pairs,sch);
        setResults(res);setTab(0);
        const tot=res.reduce((s,r)=>s+r.summary.total,0);
        setStatus(`Done — ${res.length} chain(s), ${tot} liabilities flagged. CDRs: ${CDR_SCHEMES[sch].label}`);
      };

      const onAnalyze=()=>{
        const raw=ph?"":input.trim();if(!raw){alert("Please paste or load a sequence first.");return;}
        setBusy(true);setStatus("Analyzing…");
        setTimeout(()=>{
          try{
            lastRawRef.current=raw;
            runAnalysis(raw,scheme);
          }catch(err){alert("Error: "+err.message);}
          setBusy(false);
        },20);
      };

      useEffect(()=>{
        if(!lastRawRef.current)return;
        try{ runAnalysis(lastRawRef.current,scheme); }catch(e){}
      },[scheme]);

      const onDownload=()=>{
        if(!results)return;
        const html=buildReport(results);
        const blob=new Blob([html],{type:"text/html"});
        const url=URL.createObjectURL(blob);
        const a=document.createElement("a");a.href=url;a.download="protein_liabilities.html";a.click();
        URL.revokeObjectURL(url);setStatus("HTML report downloaded.");
      };

      const tot=results?results.reduce((s,r)=>s+r.summary.total,0):0;
      const hi=results?results.reduce((s,r)=>s+(r.summary.byRisk.high||[]).length,0):0;
      const TABS=["Summary","Annotated Sequence","All Findings"];

      return (
        <div style={{height:"100vh",display:"flex",flexDirection:"column",background:T.bgDark,fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"}}>

          {/* Header */}
          <div style={{background:T.bgAccent,padding:"14px 22px",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
            <div>
              <div style={{color:"#fff",fontWeight:700,fontSize:17}}>🔬&nbsp; Protein Sequence Liability Analyzer</div>
              <div style={{color:"#a8b2c8",fontSize:10,marginTop:2}}>deamidation · oxidation · isomerization · glycosylation · pyroglutamate · truncation · CDR annotation</div>
            </div>
            <div style={{color:"#7b8fb5",fontSize:11,fontStyle:"italic"}}>Letarte Scientific Consulting</div>
          </div>

          {/* Body */}
          <div style={{flex:1,display:"flex",overflow:"hidden",background:T.bgLight,padding:"14px 14px 0"}}>

            {/* Left panel */}
            <div style={{width:400,flexShrink:0,display:"flex",flexDirection:"column",marginRight:12}}>
              <div style={{background:T.bgWhite,border:`1px solid ${T.border}`,borderRadius:8,flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
                <div style={{background:T.bgPanel,padding:"10px 14px",borderBottom:`1px solid ${T.border}`,fontWeight:700,fontSize:12}}>Sequence Input</div>
                <div style={{padding:"8px 10px",display:"flex",gap:6,borderBottom:`1px solid ${T.border}`,alignItems:"center"}}>
                  <input ref={fileRef} type="file" accept=".fasta,.fa,.faa,.txt" style={{display:"none"}} onChange={onLoad}/>
                  <button onClick={()=>fileRef.current?.click()} style={{padding:"5px 12px",fontSize:12,borderRadius:5,border:`1px solid ${T.border}`,background:T.bgPanel,cursor:"pointer",fontWeight:600}}>📁 Load FASTA</button>
                  <button onClick={onClear} style={{padding:"5px 12px",fontSize:12,borderRadius:5,border:`1px solid ${T.border}`,background:T.bgPanel,cursor:"pointer",fontWeight:600}}>🗑 Clear</button>
                </div>
                <textarea value={ph?PH:input} onChange={e=>{setInput(e.target.value);setPh(false);}} onFocus={onFocus} onBlur={onBlur}
                  style={{flex:1,resize:"none",border:"none",outline:"none",fontFamily:"'Courier New',monospace",fontSize:11,padding:"10px 12px",background:T.bgPanel,color:ph?T.fgMuted:T.fgDark,lineHeight:1.5}} spellCheck={false}/>
                <div style={{background:"#f0f7ff",padding:"5px 12px",fontSize:10,color:"#2563eb",borderTop:`1px solid ${T.border}`}}>ℹ FASTA or raw sequence · single or multi-chain · CDR auto-detected</div>
              </div>
              <button onClick={onAnalyze} disabled={busy}
                style={{marginTop:8,padding:14,fontSize:14,fontWeight:700,background:busy?"#6b7280":T.btnBlue,color:"#ffffff",border:"none",borderRadius:6,cursor:busy?"wait":"pointer",letterSpacing:"0.5px"}}
                onMouseEnter={e=>{if(!busy)e.target.style.background="#1a4080";}}
                onMouseLeave={e=>{if(!busy)e.target.style.background=T.btnBlue;}}>
                {busy?"  Analyzing…  ":"  ANALYZE  "}
              </button>
            </div>

            {/* Right panel */}
            <div style={{flex:1,display:"flex",flexDirection:"column",background:T.bgWhite,border:`1px solid ${T.border}`,borderRadius:8,overflow:"hidden"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:`2px solid ${T.border}`,background:T.bgPanel,padding:"0 14px",flexShrink:0}}>
                <div style={{display:"flex"}}>
                  {TABS.map((t,i)=>(
                    <button key={i} onClick={()=>setTab(i)} style={{padding:"12px 16px",fontSize:13,fontWeight:tab===i?700:400,color:tab===i?T.fgDark:T.fgMuted,background:"transparent",border:"none",cursor:"pointer",borderBottom:tab===i?`2px solid ${T.btnBlue}`:"2px solid transparent",marginBottom:-2}}>
                      {t}
                    </button>
                  ))}
                </div>
              </div>
              <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>
                {tab===0&&<SummaryTab results={results}/>}
                {tab===1&&<AnnotatedSeqTab results={results} scheme={scheme} setScheme={setScheme}/>}
                {tab===2&&<FindingsTab results={results}/>}
              </div>
            </div>
          </div>

          {/* Footer */}
          <div style={{background:T.bgMid,padding:"8px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
            <span style={{color:"#7b8fb5",fontSize:11}}>{status}</span>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              {results&&<span style={{color:"#7b8fb5",fontSize:11,fontWeight:700,marginRight:4}}>{tot} liabilit{tot!==1?"ies":"y"} · {hi} high-risk</span>}
              <button onClick={onDownload} disabled={!results} style={{padding:"5px 12px",fontSize:11,borderRadius:4,background:results?"#1e293b":"#374151",color:results?"#e2e8f0":"#6b7280",border:"1px solid #374151",cursor:results?"pointer":"default",fontWeight:600}}>
                💾 Download HTML Report
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ─── MOUNT ───────────────────────────────────────────────────────────────
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
